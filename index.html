<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Gallery 3D — Xreal</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" href="/icon-192.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
    #loader {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: #000; color: #fff;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
      transition: opacity 0.8s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #xr-button {
      position: fixed; bottom: 24px; right: 24px; z-index: 50;
      padding: 12px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-family: 'Helvetica Neue', sans-serif;
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; border-radius: 4px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      display: none;
    }
    #xr-button:hover { background: rgba(255,255,255,0.15); }
    #info {
      position: fixed; bottom: 24px; left: 24px; z-index: 50;
      color: rgba(255,255,255,0.3);
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="loader">loading gallery</div>
  <button id="xr-button">Enter XR</button>
  <div id="info">drag to orbit · scroll to zoom</div>
  <script type="module" src="/src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
    }
  </script>
</body>
</html>
